services:
  contact-sync:
    build: ./contact-sync
    image: ghcr.io/morrelli43/onyascoot-subprocesses:${IMAGE_TAG:-main}
    restart: unless-stopped
    volumes:
      # Mount the credentials directory (defaults to ./.credentials locally)
      - ${DOCKER_FOLDER_WEBFILES:-.}/oys_contacts/env_files:/app/env_files
    environment:
      - ENABLE_GOOGLE=${ENABLE_GOOGLE:-true}
      - ENABLE_SQUARE=${ENABLE_SQUARE:-true}
      - SQUARE_ACCESS_TOKEN=${SQUARE_ACCESS_TOKEN}
      - SQUARE_WEBHOOK_URL=${SQUARE_WEBHOOK_URL}
      - SQUARE_SIGNATURE_KEY=${SQUARE_SIGNATURE_KEY}
      - WEBFORM_STORAGE=${WEBFORM_STORAGE:-/app/env_files/webform_contacts.json}
      - GOOGLE_CREDENTIALS_FILE=${GOOGLE_CREDENTIALS_FILE:-/app/env_files/credentials.json}
      - GOOGLE_TOKEN_FILE=${GOOGLE_TOKEN_FILE:-/app/env_files/token.json}
    ports:
      - "${CONTACT_SYNC_PORT:-4310}:4310"

  calendar-sync:
    build: ./calendar-sync
    image: ghcr.io/morrelli43/onyascoot-subprocesses_calendar_sync:${IMAGE_TAG:-main}
    restart: unless-stopped
    environment:
      - SQUARE_ACCESS_TOKEN=${SQUARE_ACCESS_TOKEN}
      - GOOGLE_CREDENTIALS_FILE=${GOOGLE_CREDENTIALS_FILE:-/app/env_files/credentials.json}
      - GOOGLE_TOKEN_FILE=${GOOGLE_TOKEN_FILE:-/app/env_files/token.json}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-3600}
    volumes:
      - ${DOCKER_FOLDER_WEBFILES:-.}/oys_contacts/env_files:/app/env_files
    ports:
      - "5001:5001"
    depends_on:
      - contact-sync

  email-service:
    build: ./email-service
    image: ghcr.io/morrelli43/onyascoot-subprocesses_email_service:${IMAGE_TAG:-main}
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    environment:
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_SECURE=${SMTP_SECURE:-true}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - EMAIL_RECIPIENT=${EMAIL_RECIPIENT:-bookings@onyascoot.com}
    ports:
      - "${EMAIL_SERIVCE_PORT:-4311}:4311"
    depends_on:
      - contact-sync

  nodeifier:
    build: ./nodeifier
    image: ghcr.io/morrelli43/onyascoot-subprocesses_nodeifier:${IMAGE_TAG:-main}
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    environment:
      - PUSH_WEBHOOK_URL=${N8N_WEBHOOK_URL:-https://hooks.morrelli43media.com/webhook/message-center}
      - PORT=4312
    ports:
      - "${NODEIFIER_SERVICE_PORT:-4312}:4312"

  ops-forwarder:
    build: ./ops-forwarder
    image: ghcr.io/morrelli43/onyascoot-subprocesses_ops_forwarder:${IMAGE_TAG:-main}
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    environment:
      - PORT=4313
      - OPS_WEBHOOK_URL=${OPS_WEBHOOK_URL}
      - OPS_API_KEY=${OPS_API_KEY}
    ports:
      - "${OPS_FORWARDER_PORT:-4313}:4313"

  dontknowescooter:
    build: ./dontknowescooter
    image: ghcr.io/morrelli43/onyascoot-subprocesses_dontknowescooter:${IMAGE_TAG:-main}
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    environment:
      - PORT=4314
      - PUBLIC_URL=${DONTKNOW_PUBLIC_URL:-}
      - PHOTOS_PUBLIC_BASE_URL=${PHOTOS_PUBLIC_BASE_URL:-}
    volumes:
      - ${DOCKER_FOLDER_WEBFILES:-.}/dontknowescooter:/app/uploads/4362tres
    ports:
      - "${DONTKNOWESCOOTER_PORT:-4314}:4314"

  message-router:
    build: ./message-router
    image: ghcr.io/morrelli43/onyascoot-subprocesses_message_router:${IMAGE_TAG:-main}
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    environment:
      - PORT=4300
      - CONTACT_SYNC_URL=http://contact-sync:4310/send-it
      - EMAIL_SERVICE_URL=http://email-service:4311/send-it
      - NODEIFIER_URL=http://nodeifier:4312/send-it
      - OPS_FORWARDER_URL=http://ops-forwarder:4313/send-it
      - CALENDAR_SYNC_URL=http://calendar-sync:5001/webhooks/square
      - DONTKNOW_URL=http://dontknowescooter:4314
      - DONTKNOW_PUBLIC_URL=${DONTKNOW_PUBLIC_URL}
      - PHOTOS_PUBLIC_BASE_URL=${PHOTOS_PUBLIC_BASE_URL}
    ports:
      - "${MESSAGE_ROUTER_PORT:-4300}:4300"
    depends_on:
      - contact-sync
      - email-service
      - nodeifier
      - ops-forwarder

  sms-gateway:
    build: ./sms-gateway
    image: ghcr.io/morrelli43/onyascoot-subprocesses_sms_gateway:${IMAGE_TAG:-main}
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    environment:
      - SMS_GATEWAY_API_KEY=${SMS_GATEWAY_API_KEY}
      - OPS_API_KEY=${OPS_API_KEY}
      - WEB_PORTAL_INCOMING_URL=${WEB_PORTAL_INCOMING_URL}
      - PORT=4330
    ports:
      - "${SMS_GATEWAY_PORT:-4330}:4330"



networks:
  default:
    name: ${DOCKER_NETWORK_NAME:-oys_frontend_live_net}
    external: true
