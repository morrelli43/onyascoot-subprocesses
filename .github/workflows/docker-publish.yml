name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta_sync.outputs.tags }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for contact-sync
        id: meta_sync
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,format=long

      - name: Build and push contact-sync
        uses: docker/build-push-action@v5
        with:
          context: ./contact-sync
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_sync.outputs.tags }}
          labels: ${{ steps.meta_sync.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: CACHE_BUST=${{ github.sha }}

      - name: Extract metadata for booking-sync
        id: meta_booking
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}_booking_sync
          tags: |
            type=ref,event=branch
            type=sha,format=long

      - name: Build and push booking-sync
        uses: docker/build-push-action@v5
        with:
          context: ./booking-sync
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_booking.outputs.tags }}
          labels: ${{ steps.meta_booking.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: CACHE_BUST=${{ github.sha }}

      - name: Extract metadata for email-service
        id: meta_email
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}_email_service
          tags: |
            type=ref,event=branch
            type=sha,format=long

      - name: Build and push email-service
        uses: docker/build-push-action@v5
        with:
          context: ./email-service
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_email.outputs.tags }}
          labels: ${{ steps.meta_email.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: CACHE_BUST=${{ github.sha }}

      - name: Extract metadata for nodeifier
        id: meta_nodeifier
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}_nodeifier
          tags: |
            type=ref,event=branch
            type=sha,format=long

      - name: Build and push nodeifier
        uses: docker/build-push-action@v5
        with:
          context: ./nodeifier
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_nodeifier.outputs.tags }}
          labels: ${{ steps.meta_nodeifier.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: CACHE_BUST=${{ github.sha }}

      - name: Extract metadata for message-router
        id: meta_router
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}_message_router
          tags: |
            type=ref,event=branch
            type=sha,format=long

      - name: Build and push message-router
        uses: docker/build-push-action@v5
        with:
          context: ./message-router
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_router.outputs.tags }}
          labels: ${{ steps.meta_router.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: CACHE_BUST=${{ github.sha }}

      - name: Extract metadata for ops-forwarder
        id: meta_ops_forwarder
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}_ops_forwarder
          tags: |
            type=ref,event=branch
            type=sha,format=long

      - name: Build and push ops-forwarder
        uses: docker/build-push-action@v5
        with:
          context: ./ops-forwarder
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_ops_forwarder.outputs.tags }}
          labels: ${{ steps.meta_ops_forwarder.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: CACHE_BUST=${{ github.sha }}

      - name: Extract metadata for dontknowescooter
        id: meta_dontknowescooter
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}_dontknowescooter
          tags: |
            type=ref,event=branch
            type=sha,format=long

      - name: Build and push dontknowescooter
        uses: docker/build-push-action@v5
        with:
          context: ./dontknowescooter
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_dontknowescooter.outputs.tags }}
          labels: ${{ steps.meta_dontknowescooter.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: CACHE_BUST=${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    if: github.ref_name == 'main'
    environment: ${{ github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare connection
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_HOST_URL: ${{ secrets.SSH_HOST_URL }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deployment_key
          chmod 600 ~/.ssh/deployment_key
          # Scan keys on the correct port (Default to 22 if not set)
          PORT=${SSH_PORT:-22}
          ssh-keyscan -p $PORT -H "$SSH_HOST_URL" >> ~/.ssh/known_hosts

          # Print the fingerprint of the private key
          echo "SSH Key Fingerprint:"
          ssh-keygen -l -f ~/.ssh/deployment_key

      - name: Upload Google credentials to server
        env:
          SSH_HOST_URL: ${{ secrets.SSH_HOST_URL }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DOCKER_FOLDER_WEBFILES: ${{ vars.DOCKER_FOLDER_WEBFILES }}
        run: |
          PORT=${SSH_PORT:-22}
          # Remove trailing slash from DOCKER_FOLDER_WEBFILES if present
          WEBFILES_DIR="${DOCKER_FOLDER_WEBFILES%/}"
          REMOTE_CRED_DIR="${WEBFILES_DIR:-deployments/oys_subprocesses}/oys_contacts/env_files"

          # Ensure destination exists on the remote server
          ssh -p $PORT -o StrictHostKeyChecking=no -i ~/.ssh/deployment_key \
            $SSH_USERNAME@$SSH_HOST_URL "mkdir -p $REMOTE_CRED_DIR"
           # Create credentials directory if not present
          mkdir -p oys_contacts/env_files

          # Write secrets to files
          if [ -n "${{ secrets.GOOGLE_TOKEN_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_TOKEN_JSON }}' > oys_contacts/env_files/token.json
            echo "✅ token.json extracted from secrets"
          fi

          if [ -n "${{ secrets.GOOGLE_CREDENTIALS_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > oys_contacts/env_files/credentials.json
            echo "✅ credentials.json extracted from secrets"
          fi

          # Upload to server
          if [ -f oys_contacts/env_files/token.json ]; then
            scp -P $PORT -o StrictHostKeyChecking=no -i ~/.ssh/deployment_key \
              oys_contacts/env_files/token.json \
              "$SSH_USERNAME@$SSH_HOST_URL:$REMOTE_CRED_DIR/token.json"
            echo "🚀 token.json pushed to server"
          else
            echo "⚠️ GOOGLE_TOKEN_JSON secret missing!"
          fi

          if [ -f oys_contacts/env_files/credentials.json ]; then
            scp -P $PORT -o StrictHostKeyChecking=no -i ~/.ssh/deployment_key \
              oys_contacts/env_files/credentials.json \
              "$SSH_USERNAME@$SSH_HOST_URL:$REMOTE_CRED_DIR/credentials.json"
            echo "🚀 credentials.json pushed to server"
          else
            echo "⚠️ GOOGLE_CREDENTIALS_JSON secret missing!"
          fi

      - name: Deploy to Raspberry Pi
        env:
          SSH_HOST_URL: ${{ secrets.SSH_HOST_URL }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          TARGET_DIR: ${{ vars.TARGET_DIR }}
          DOCKER_FOLDER_WEBFILES: ${{ vars.DOCKER_FOLDER_WEBFILES }}
          GH_REPO: ${{ github.repository }}
          # Determine variables based on branch
          IMAGE_TAG: ${{ github.ref_name }}
          GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Service ports and endpoints (from vars)
          EMAIL_SERIVCE_PORT: ${{ vars.EMAIL_SERIVCE_PORT }}
          N8N_WEBHOOK_URL: ${{ vars.N8N_WEBHOOK_URL }}
          SQUARE_WEBHOOK_URL: ${{ vars.SQUARE_WEBHOOK_URL }}
          CONTACT_SYNC_PORT: ${{ vars.CONTACT_SYNC_PORT }}

          # Environment Configuration Variables
          ENABLE_GOOGLE_VAL: ${{ vars.ENABLE_GOOGLE }}
          ENABLE_SQUARE_VAL: ${{ vars.ENABLE_SQUARE }}
          WEBFORM_STORAGE_VAL: ${{ vars.WEBFORM_STORAGE }}
          FRONTEND_LIVE_VAL: ${{ vars.FRONTEND_LIVE }}
          SMTP_HOST_VAL: ${{ vars.SMTP_HOST }}
          SMTP_PORT_VAL: ${{ vars.SMTP_PORT }}
          SMTP_SECURE_VAL: ${{ vars.SMTP_SECURE }}
          SMTP_FROM_VAL: ${{ vars.SMTP_FROM }}
          EMAIL_RECIPIENT_VAL: ${{ vars.EMAIL_RECIPIENT }}

          # Auth Secrets (Injected from GitHub Environments into the SSH block)
          SQUARE_ACCESS_TOKEN_VAL: ${{ secrets.SQUARE_ACCESS_TOKEN }}
          SQUARE_SIGNATURE_KEY_VAL: ${{ secrets.SQUARE_SIGNATURE_KEY }}
          SMTP_USER_VAL: ${{ secrets.SMTP_USER }}
          SMTP_PASS_VAL: ${{ secrets.SMTP_PASS }}
          GOOGLE_CREDENTIALS_FILE_VAL: ${{ secrets.GOOGLE_CREDENTIALS_FILE }}
          GOOGLE_TOKEN_FILE_VAL: ${{ secrets.GOOGLE_TOKEN_FILE }}
          GRIST_API_KEY_VAL: ${{ secrets.GRIST_API_KEY }}
          MESSAGE_ROUTER_PORT: ${{ vars.MESSAGE_ROUTER_PORT }}
          NODEIFIER_SERVICE_PORT: ${{ vars.NODEIFIER_SERVICE_PORT }}
          OPS_FORWARDER_PORT: ${{ vars.OPS_FORWARDER_PORT }}
          OPS_WEBHOOK_URL: ${{ vars.OPS_WEBHOOK_URL }}
          OPS_API_KEY_VAL: ${{ secrets.OPS_API_KEY }}
          DONTKNOW_PUBLIC_URL: ${{ vars.DONTKNOW_PUBLIC_URL }}
          PHOTOS_PUBLIC_BASE_URL: ${{ vars.PHOTOS_PUBLIC_BASE_URL }}

        run: |
          # Define environment-specific variables
          if [ "${{ github.ref_name }}" == "main" ]; then
            DEPLOY_DIR=${TARGET_DIR:-${DOCKER_FOLDER_WEBFILES:-"deployments/oys_processes_live"}}
          else
            DEPLOY_DIR=${TARGET_DIR:-${DOCKER_FOLDER_WEBFILES:-"deployments/oys_processes_development"}}
          fi

          # Derive repo name for project naming (remove owner)
          REPO_NAME=$(echo "$GH_REPO" | cut -d'/' -f2)
          PROJECT_NAME="${REPO_NAME}-${IMAGE_TAG}"
          NETWORK_NAME="${PROJECT_NAME}"

          # Use custom port if set, otherwise 22
          PORT=${SSH_PORT:-22}
          echo "Deploying to $SSH_HOST_URL:$PORT -> ~/$DEPLOY_DIR"

          # 0. Ensure target directory exists
          ssh -p $PORT -o StrictHostKeyChecking=no -i ~/.ssh/deployment_key $SSH_USERNAME@$SSH_HOST_URL "mkdir -p ~/$DEPLOY_DIR"

          # 1. SCP the docker-compose.yml
          scp -P $PORT -o StrictHostKeyChecking=no -i ~/.ssh/deployment_key docker-compose.yml $SSH_USERNAME@$SSH_HOST_URL:~/$DEPLOY_DIR/docker-compose.subprocesses.yml

          # 2. SSH in to configure and start
          ssh -p $PORT -o StrictHostKeyChecking=no -i ~/.ssh/deployment_key $SSH_USERNAME@$SSH_HOST_URL << EOF
            cd ~/$DEPLOY_DIR
            
            # Create .env file with all variables needed by docker-compose
            echo "Generating .env..."
            echo "NODE_ENV=production" > .env.subprocesses
            echo "GITHUB_REPOSITORY=$GH_REPO" >> .env.subprocesses
            echo "IMAGE_TAG=$IMAGE_TAG" >> .env.subprocesses
            
            # Contact Sync Secrets and Settings
            echo "ENABLE_GOOGLE=$ENABLE_GOOGLE_VAL" >> .env.subprocesses
            echo "ENABLE_SQUARE=$ENABLE_SQUARE_VAL" >> .env.subprocesses
            echo "FRONTEND_LIVE=$FRONTEND_LIVE_VAL" >> .env.subprocesses
            echo "SQUARE_ACCESS_TOKEN=$SQUARE_ACCESS_TOKEN_VAL" >> .env.subprocesses
            echo "SQUARE_SIGNATURE_KEY=$SQUARE_SIGNATURE_KEY_VAL" >> .env.subprocesses
            echo "SQUARE_WEBHOOK_URL=$SQUARE_WEBHOOK_URL" >> .env.subprocesses
            echo "CONTACT_SYNC_PORT=$CONTACT_SYNC_PORT" >> .env.subprocesses
            echo "WEBFORM_STORAGE=$WEBFORM_STORAGE_VAL" >> .env.subprocesses
            echo "GOOGLE_CREDENTIALS_FILE=$GOOGLE_CREDENTIALS_FILE_VAL" >> .env.subprocesses
            echo "GOOGLE_TOKEN_FILE=$GOOGLE_TOKEN_FILE_VAL" >> .env.subprocesses
            echo "GRIST_API_KEY=$GRIST_API_KEY_VAL" >> .env.subprocesses
            
            # Email Service / SMTP Secrets and Settings
            echo "SMTP_HOST=$SMTP_HOST_VAL" >> .env.subprocesses
            echo "SMTP_PORT=$SMTP_PORT_VAL" >> .env.subprocesses
            echo "SMTP_SECURE=$SMTP_SECURE_VAL" >> .env.subprocesses
            echo "SMTP_USER=$SMTP_USER_VAL" >> .env.subprocesses
            echo "SMTP_PASS=$SMTP_PASS_VAL" >> .env.subprocesses
            echo "SMTP_FROM=$SMTP_FROM_VAL" >> .env.subprocesses
            echo "EMAIL_RECIPIENT=$EMAIL_RECIPIENT_VAL" >> .env.subprocesses
            echo "N8N_WEBHOOK_URL=$N8N_WEBHOOK_URL" >> .env.subprocesses
            echo "EMAIL_SERIVCE_PORT=$EMAIL_SERIVCE_PORT" >> .env.subprocesses
            echo "MESSAGE_ROUTER_PORT=$MESSAGE_ROUTER_PORT" >> .env.subprocesses
            echo "NODEIFIER_SERVICE_PORT=$NODEIFIER_SERVICE_PORT" >> .env.subprocesses
            echo "OPS_FORWARDER_PORT=$OPS_FORWARDER_PORT" >> .env.subprocesses
            echo "OPS_WEBHOOK_URL=$OPS_WEBHOOK_URL" >> .env.subprocesses
            echo "OPS_API_KEY=$OPS_API_KEY_VAL" >> .env.subprocesses
            echo "DONTKNOW_PUBLIC_URL=$DONTKNOW_PUBLIC_URL" >> .env.subprocesses
            echo "PHOTOS_PUBLIC_BASE_URL=$PHOTOS_PUBLIC_BASE_URL" >> .env.subprocesses
            echo "DOCKER_NETWORK_NAME=$NETWORK_NAME" >> .env.subprocesses
            echo "DOCKER_FOLDER_WEBFILES=$DOCKER_FOLDER_WEBFILES" >> .env.subprocesses

            # Pre-create the bridge network so other stacks can share it as 'external'
            echo "Ensuring frontend bridge network exists..."
            docker network create $NETWORK_NAME || true

            # Stop and remove existing containers using the isolated compose file and project name
            echo "Stopping existing containers..."
            docker compose -f docker-compose.subprocesses.yml --env-file .env.subprocesses -p $PROJECT_NAME down || true
            
            # Login to GHCR to allow pulling
            echo "$GIT_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            echo "Pulling latest images..."
            docker compose -f docker-compose.subprocesses.yml --env-file .env.subprocesses -p $PROJECT_NAME pull
            
            # Start containers
            echo "Starting environment..."
            docker compose -f docker-compose.subprocesses.yml --env-file .env.subprocesses -p $PROJECT_NAME up -d --remove-orphans
            
            # Clean up old images
            docker image prune -f
            
            # Show running containers
            docker compose -f docker-compose.subprocesses.yml --env-file .env.subprocesses -p $PROJECT_NAME ps
          EOF
